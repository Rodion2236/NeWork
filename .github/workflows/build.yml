name: CI

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode google-services.json
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: printf '%s' "$FIREBASE_SECRET" > ./app/google-services.json

      - name: Create api-key.properties from GitHub Secrets
        run: |
          echo "NETOLOGY_API_KEY=${{ secrets.API_KEY }}" > api-key.properties
          echo "YANDEX_MAPKIT_KEY=${{ secrets.MAPKIT_API_KEY }}" >> api-key.properties
          echo "=== api-key.properties создан ==="
          cat api-key.properties

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk